<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interstellar Adventure — Build in progress</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .stage {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      image-rendering: pixelated;
    }
    .rocket {
      width: clamp(120px, 22vh, 220px);
      height: auto;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: translateY(0) scale(1); opacity: 1; }
      50%      { transform: translateY(-6px) scale(1.04); opacity: 0.92; }
    }
    .label {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      text-align: center;
    }
    .sublabel {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img class="rocket" src="../../images/interstellar-adventure-rocket.png" alt="Interstellar Adventure" />
    <div>
      <div class="label">Build in progress</div>
      <div class="sublabel">WebGL playable coming soon</div>
    </div>
  </div>
</body>
</html>
